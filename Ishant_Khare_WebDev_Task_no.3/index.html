<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="converter-container">
        <header class="card-header">
            <h1>TempConvert</h1>
            <p>Convert temperatures instantly between Celsius, Fahrenheit, and Kelvin.</p>
        </header>

        <section class="converter-form">
            <div class="input-group">
                <label for="tempInput">Enter Temperature</label>
                <input type="number" id="tempInput" placeholder="e.g., 25" step="any">
            </div>

            <div class="input-group">
                <label for="inputUnit">From Unit</label>
                <select id="inputUnit">
                    <option value="celsius">Celsius (&deg;C)</option>
                    <option value="fahrenheit">Fahrenheit (&deg;F)</option>
                    <option value="kelvin">Kelvin (K)</option>
                </select>
            </div>

            <button id="convertBtn">Convert Temperature</button>
        </section>

        <section id="resultArea" class="result-area">
            <p class="result-placeholder">Results will be displayed here.</p>
        </section>

        <footer class="card-footer">
            <p>Developed by <strong>Ishant Khare</strong></p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
